name: Run OpenEO Tests
on:
  repository_dispatch:
    types:
      - test-execute-openeotestsuite

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Create virtual environment
        run: python -m venv venv
      
      - name: Activate virtual environment and install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          openeo-auth oidc-auth https://openeo-staging.datalakecube.eumetsat.data.destination-earth.eu/openeo/1.1.0/
      
      - name: Run OpenEO tests
        run: |
          source venv/bin/activate
          pytest src/openeo_test_suite/tests/general/ \
            --html=reports/general.html \
            --openeo-backend-url=https://openeo-staging.datalakecube.eumetsat.data.destination-earth.eu/openeo/1.1.0/
      
      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: reports/general.html
